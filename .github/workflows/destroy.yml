name: Destroy AWS Infrastructure

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: "Type 'destroy' to confirm you want to tear down all infrastructure"
        required: true
        default: ""

permissions:
  contents: read

jobs:
  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm_destroy == 'destroy' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Empty ECR repository before destroy
        env:
          PROJECT_NAME: ${{ secrets.PROJECT_NAME }}
          AWS_REGION_VAL: ${{ secrets.AWS_REGION }}
        run: |
          echo "Deleting all images from ECR repository '${PROJECT_NAME}'..."
          IMAGE_IDS=$(aws ecr list-images \
            --repository-name "${PROJECT_NAME}" \
            --region "${AWS_REGION_VAL}" \
            --query 'imageIds[*]' \
            --output json 2>/dev/null || echo "[]")

          if [ "${IMAGE_IDS}" != "[]" ] && [ -n "${IMAGE_IDS}" ]; then
            aws ecr batch-delete-image \
              --repository-name "${PROJECT_NAME}" \
              --region "${AWS_REGION_VAL}" \
              --image-ids "${IMAGE_IDS}" \
              --output text
            echo "Images deleted."
          else
            echo "No images to delete or repository does not exist."
          fi

      - name: Terraform Destroy
        working-directory: terraform
        run: |
          terraform destroy -auto-approve \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="image_uri=placeholder/placeholder:latest"

      - name: Confirm destruction
        run: |-
          echo "Infrastructure for project '${{ secrets.PROJECT_NAME }}' has been destroyed."
